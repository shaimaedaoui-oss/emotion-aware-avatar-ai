<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link rel="stylesheet" href="styleLogin.css">
</head>
<body>
  <!-- 🌿 Background Image -->
  <div class="background-image"></div>

  <!-- 🔲 Login Box -->
  <div class="login-box">
    <h2>Welcome back</h2>
    <p>Please enter your details.</p>
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Enter your e-mail" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="*******" required />

      <div class="options">
        <label><input type="checkbox" id="rememberMe" /> Remember me</label>
        <a href="forgot-password.html">Forgot your password?</a>
      </div>

      <button type="submit">Log in</button>

      <p class="register">
        Don't have an account? <a href="/singup/singup.html">Register here</a>
      </p>
    </form>
  </div>

  <!-- 🎥 Right-side Video (decoration) -->
  <div class="video-side">
    <video autoplay muted loop>
      <source src="imag5.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <script type="module">
  import { auth, db } from './firebase-config.js';
  import { signInWithEmailAndPassword, setPersistence, browserSessionPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-auth.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js";


  const loginForm = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const rememberMeCheckbox = document.getElementById('rememberMe');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitButton = loginForm.querySelector('button[type="submit"]');
    submitButton.disabled = true;
    submitButton.innerHTML = '<span class="spinner">Loading...</span>';

    try {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const rememberMe = rememberMeCheckbox.checked;

      // Set persistence
      await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
      
      // Sign in
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      // Check avatar selection
      const userDoc = await getDoc(doc(db, "users", user.uid));
      
      if (userDoc.exists() && userDoc.data().avatarType) {
        window.location.href = 'chat.html';
      } else {
        window.location.href = '/gender/gender.html';
      }
      
    } catch (error) {
      console.error("Login error:", error);
      alert(getErrorMessage(error));
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = 'Log in';
    }
  });

  function getErrorMessage(error) {
    switch (error.code) {
      case 'auth/invalid-email': return 'Invalid email address';
      case 'auth/user-disabled': return 'Account disabled';
      case 'auth/user-not-found': return 'Account not found';
      case 'auth/wrong-password': return 'Incorrect password';
      case 'auth/too-many-requests': return 'Too many attempts. Try again later';
      default: return 'Login failed. Please try again';
    }
  }

  // Auto-redirect if already logged in
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists() && userDoc.data().avatarType) {
        window.location.href = 'chat.html';
      } else {
        window.location.href = '/gender/gender.html';
      }
    }
  });
</script>
</body>
</html>
