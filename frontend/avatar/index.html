<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Powered 3D Face Animation</title>
  <link rel="stylesheet" href="styles.css">
 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
</head>
<body>
  <!-- Main App Container -->
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="logo-container">
        <div class="logo-icon">
          <i class="fas fa-robot"></i>
        </div>
        <h1 class="logo-text">FaceAI</h1>
      </div>
      
      <nav class="main-nav">
        <ul>
          <li class="active">
            <a href="#">
              <i class="fas fa-home"></i>
              <span>Dashboard</span>
              <div class="nav-highlight"></div>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fas fa-cog"></i>
              <span>Settings</span>
              <div class="nav-highlight"></div>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fas fa-info-circle"></i>
              <span>About</span>
              <div class="nav-highlight"></div>
            </a>
          </li>
        </ul>
      </nav>
      
      <div class="user-profile">
        <div class="avatar">
          <i class="fas fa-user"></i>
        </div>
        <div class="user-info">
          <span class="username">User</span>
          <span class="user-status">Online</span>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Header -->
      <header class="content-header">
        <h2>3D Face Animation Studio</h2>
        <div class="header-controls">
          <button class="btn-help">
            <i class="fas fa-question-circle"></i> Help
          </button>
        </div>
      </header>
      
      <!-- Main Content Grid -->
      <div class="content-grid">
        <!-- Left Column - 3D Viewer -->
        <div class="viewer-column">
          <div class="viewer-container">
            <div id="canvas-container"></div>
            
            <div class="viewer-controls">
              <div class="control-group">
                <button id="upload-image" class="btn-upload">
                  <i class="fas fa-cloud-upload-alt"></i> Upload Face Texture
                </button>
                <input type="file" id="texture-upload" accept="image/*" style="display: none;" />
              </div>
              
              <div class="control-group tracking-buttons">
                <button id="start-tracking" class="btn-tracking btn-tracking-start">
                  <i class="fas fa-video"></i> Start Tracking
                </button>
                <button id="stop-tracking" class="btn-tracking btn-tracking-stop">
                  <i class="fas fa-stop"></i> Stop Tracking
                </button>
              </div>
            </div>
          </div>
          
          <!-- Face Tracking Preview -->
          <div class="tracking-preview">
            <div class="preview-header">
              <h3>Face Tracking Preview</h3>
              <div class="preview-indicator">
                <span class="indicator-dot"></span>
                <span>Active</span>
              </div>
            </div>
            <div class="preview-content">
              <video id="webcam-video" autoplay muted playsinline style="display:none;"></video>
              <canvas id="face-overlay"></canvas>
              <canvas id="debug-canvas" style="display:none;"></canvas>
            </div>
          </div>
        </div>
        
        <!-- Right Column - Interaction Panels -->
        <div class="interaction-column">
          <!-- Voice Control Panel -->
          <div class="interaction-panel voice-panel">
            <div class="panel-header">
              <i class="fas fa-microphone"></i>
              <h3>Voice Interaction</h3>
            </div>
            <div class="panel-content">
              <button id="startBtn" class="btn-voice-control">
                <i class="fas fa-microphone-alt"></i> Start Listening
                <span class="pulse-ring"></span>
              </button>
              <div class="voice-result">
                <h4>You said:</h4>
                <p id="resultText" class="transcript">Speak now...</p>
              </div>
              <div class="voice-visualizer">
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
                <div class="visualizer-bar"></div>
              </div>
            </div>
          </div>
          
          <!-- Text Analysis Panel -->
          <div class="interaction-panel text-panel">
            <div class="panel-header">
              <i class="fas fa-keyboard"></i>
              <h3>Text Emotion Analysis</h3>
            </div>
            <div class="panel-content">
              <textarea id="user-text" placeholder="Type something to analyze emotion..."></textarea>
              <button id="analyze-text" class="btn-analyze">
                <i class="fas fa-brain"></i> Analyze Emotion
              </button>
              <div id="emotion-result" class="emotion-display">
                <div class="emotion-meter">
                  <div class="emotion-label">Happiness</div>
                  <div class="meter-bar">
                    <div class="meter-fill" style="width: 0%"></div>
                  </div>
                  <div class="emotion-value">0%</div>
                </div>
                <!-- More emotion meters would go here -->
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Debug Controls 
      <div class="debug-controls">
        <button class="debug-toggle">
          <i class="fas fa-sliders-h"></i> Developer Tools
        </button>
        <div class="debug-panel">
          <button id="test-jaw" class="btn-debug">
            <i class="fas fa-grin"></i> Test Jaw
          </button>
          <button id="test-brows" class="btn-debug">
            <i class="fas fa-surprise"></i> Test Eyebrows
          </button>
          <div class="slider-control">
            <label><i class="fas fa-laugh-beam"></i> Mouth Openness</label>
            <input type="range" id="mouth-open-slider" min="0" max="1" step="0.01" value="0">
          </div>
        </div>
      </div>
    </main>
  </div>-->
  
  <!-- Loading Indicator -->
  <div id="loading-message" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Loading face tracking models... (may take a minute)</p>
    </div>
  </div>



  <script>
  // Get references to the elements
  const uploadButton = document.getElementById('upload-image');
  const fileInput = document.getElementById('texture-upload');

  // When the user clicks the "Upload Face Texture" button
  uploadButton.addEventListener('click', () => {
    fileInput.click(); // Trigger the hidden file input
  });

  // Optional: Handle the selected image
  fileInput.addEventListener('change', (event) => {
    const file = event.target.files[0];
    if (file) {
      console.log("Selected file:", file.name);
      // TODO: Add your logic to upload or display the image
      // For example: preview the image or send it to your model
    }
  });
</script>

  <!-- Load dlib.js for face tracking -->
  <script src="https://cdn.jsdelivr.net/gh/justadudewhohacks/dlib-build@master/dist/dlib.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  
 <!-- <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>-->

  <!-- Three.js Libraries -->
  <script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.146.0/examples/js/controls/OrbitControls.js"></script>






  <!-- Face Tracking Script -->
  <script src="face-tracking.js"></script>
  

  <script type="module" src="./main.js"></script>
  
</body>
</html>
